name: Release

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build-binaries:
    name: Build Binaries
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Build Holt CLI
        run: |
          make build-darwin-arm64
          make build-darwin-amd64
          make build-linux-arm64
          make build-linux-amd64

      - name: Build Pup
        run: |
          make build-pup-darwin-arm64
          make build-pup-darwin-amd64
          make build-pup-linux-arm64
          make build-pup-linux-amd64

      - name: Build Orchestrator
        run: |
          make build-orchestrator-linux-arm64
          make build-orchestrator-linux-amd64

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: bin/*
          retention-days: 1

  build-push-image:
    name: Build and Push Orchestrator Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/holt-orchestrator
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Set build variables
        id: vars
        run: |
          echo "VERSION=$(git describe --tags --always --dirty)" >> $GITHUB_OUTPUT
          echo "COMMIT=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "DATE=$(date -u '+%Y-%m-%d_%H:%M:%S')" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: cmd/orchestrator/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          build-args: |
            VERSION=${{ steps.vars.outputs.VERSION }}
            COMMIT=${{ steps.vars.outputs.COMMIT }}
            DATE=${{ steps.vars.outputs.DATE }}

  build-docs:
    name: Build Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Pandoc and TeX Live
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-xetex

      - name: Create Output Directory
        run: mkdir -p pdfs

      - name: Convert Markdown to PDF
        run: |
          for file in docs/compliance/*.md; do
            filename=$(basename "$file" .md)
            echo "Converting $file to pdfs/$filename.pdf"
            pandoc "$file" -o "pdfs/$filename.pdf" --pdf-engine=xelatex
          done

      - name: Zip PDFs
        run: |
          zip -r compliance-docs.zip pdfs

      - name: Zip Independent Clan Docs
        run: |
          # Calculate version info
          VERSION=$(git describe --tags --always --dirty)
          COMMIT=$(git rev-parse --short HEAD)
          DATE=$(date -u '+%Y-%m-%d_%H:%M:%S')
          METADATA="Version: $VERSION\nCommit: $COMMIT\nDate: $DATE"
          
          # Inject into README
          sed -i "s/{{VERSION_METADATA}}/$METADATA/g" docs/independent-holt-clan-creation/README.md
          
          cp scripts/download-holt.sh docs/independent-holt-clan-creation/
          zip -r independent-clan-docs.zip docs/independent-holt-clan-creation

      - name: Upload Compliance Docs
        uses: actions/upload-artifact@v4
        with:
          name: compliance-docs
          path: compliance-docs.zip

      - name: Upload Independent Clan Docs
        uses: actions/upload-artifact@v4
        with:
          name: independent-clan-docs
          path: independent-clan-docs.zip

  create-release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [build-binaries, build-push-image, build-docs]
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: binaries
          path: bin

      - name: Download Compliance Docs
        uses: actions/download-artifact@v4
        with:
          name: compliance-docs
          path: .

      - name: Download Independent Clan Docs
        uses: actions/download-artifact@v4
        with:
          name: independent-clan-docs
          path: .

      # Case 1: Stable Release (Tagged)
      - name: Create Stable Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            bin/*
            compliance-docs.zip
            independent-clan-docs.zip
          generate_release_notes: true

      # Case 2: Rolling "Latest" Release (Main Branch)
      - name: Update Latest Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          name: Latest Build (Rolling)
          tag_name: latest
          prerelease: true
          files: |
            bin/*
            compliance-docs.zip
            independent-clan-docs.zip
          make_latest: false # Keep semantic tags as "latest" in UI

